      <stop offset="0%" stop-color="#5a5a5a"/>
      <stop offset="100%" stop-color="#333333"/>
    </linearGradient>
  </defs>

  <g fill="url(#possumGradient)">
    <ellipse cx="150" cy="120" rx="80" ry="50"/> 
    <path d="M 90 90 Q 110 60 150 90 Q 190 120 210 90" stroke="none"/> 
    <circle cx="110" cy="80" r="18"/> 
