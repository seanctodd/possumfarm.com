    <ellipse cx="170" cy="130" rx="15" ry="8"/> 
    <polygon points="140,60 150,40 160,60" fill="white"/> 
    <ellipse cx="110" cy="75" rx="8" ry="4" fill="black"/> 
    <ellipse cx="190" cy="75" rx="8" ry="4" fill="black"/> 
    <path d="M 120 100 L 130 140 L 140 100 Z"/> 
