<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <title>Possum Farm Logo Possum</title>
  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b0b0c8"/>
      <stop offset="100%" stop-color="#4a4a6a"/>
    </radialGradient>
    <radialGradient id="faceGrad" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#e8e8f0"/>
      <stop offset="100%" stop-color="#b8b8cc"/>
    </radialGradient>
  </defs>

  <!-- Body -->
  <ellipse cx="100" cy="130" rx="60" ry="45" fill="url(#bodyGrad)"/>

  <!-- Head -->
  <ellipse cx="100" cy="78" rx="42" ry="38" fill="url(#faceGrad)"/>

  <!-- Ears -->
  <ellipse cx="68" cy="47" rx="14" ry="18" fill="#5a5a7a" transform="rotate(-15 68 47)"/>
  <ellipse cx="132" cy="47" rx="14" ry="18" fill="#5a5a7a" transform="rotate(15 132 47)"/>
  <ellipse cx="68" cy="47" rx="8" ry="11" fill="#cc88aa" transform="rotate(-15 68 47)"/>
  <ellipse cx="132" cy="47" rx="8" ry="11" fill="#cc88aa" transform="rotate(15 132 47)"/>

  <!-- Eyes -->
  <circle cx="84" cy="72" r="10" fill="#111122"/>
  <circle cx="116" cy="72" r="10" fill="#111122"/>
  <circle cx="84" cy="72" r="7" fill="#1a1a3a"/>
  <circle cx="116" cy="72" r="7" fill="#1a1a3a"/>
  <!-- Eye shine -->
  <circle cx="87" cy="69" r="3" fill="white" opacity="0.9"/>
  <circle cx="119" cy="69" r="3" fill="white" opacity="0.9"/>
  <circle cx="86" cy="68" r="1.5" fill="white"/>
  <circle cx="118" cy="68" r="1.5" fill="white"/>

  <!-- Nose -->
  <ellipse cx="100" cy="88" rx="7" ry="5" fill="#cc6699"/>
  <!-- Nostrils -->
  <ellipse cx="97" cy="88" rx="2" ry="1.5" fill="#aa4477"/>
  <ellipse cx="103" cy="88" rx="2" ry="1.5" fill="#aa4477"/>

  <!-- Mouth -->
  <path d="M 93 94 Q 100 100 107 94" stroke="#7a5a6a" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="55" y1="86" x2="88" y2="90" stroke="#888" stroke-width="1.2" opacity="0.7"/>
  <line x1="52" y1="90" x2="88" y2="91" stroke="#888" stroke-width="1.2" opacity="0.7"/>
  <line x1="55" y1="94" x2="88" y2="93" stroke="#888" stroke-width="1.2" opacity="0.7"/>
  <line x1="112" y1="90" x2="145" y2="86" stroke="#888" stroke-width="1.2" opacity="0.7"/>
  <line x1="112" y1="91" x2="148" y2="90" stroke="#888" stroke-width="1.2" opacity="0.7"/>
  <line x1="112" y1="93" x2="145" y2="94" stroke="#888" stroke-width="1.2" opacity="0.7"/>

  <!-- Tail -->
  <path d="M 155 145 Q 185 130 180 110 Q 175 90 165 105 Q 160 115 170 120" stroke="#7a7a9a" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Front paws -->
  <ellipse cx="68" cy="165" rx="16" ry="10" fill="url(#bodyGrad)"/>
  <ellipse cx="132" cy="165" rx="16" ry="10" fill="url(#bodyGrad)"/>
  <!-- Toes -->
  <circle cx="58" cy="168" r="4" fill="#9898b8"/>
  <circle cx="65" cy="171" r="4" fill="#9898b8"/>
  <circle cx="72" cy="172" r="4" fill="#9898b8"/>
  <circle cx="79" cy="170" r="4" fill="#9898b8"/>
  <circle cx="122" cy="170" r="4" fill="#9898b8"/>
  <circle cx="129" cy="172" r="4" fill="#9898b8"/>
  <circle cx="136" cy="171" r="4" fill="#9898b8"/>
  <circle cx="143" cy="168" r="4" fill="#9898b8"/>
</svg>
