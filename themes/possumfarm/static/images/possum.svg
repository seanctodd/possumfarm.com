<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <title>Papi Possum</title>
  <defs>
    <radialGradient id="faceGrad" cx="45%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f0f0f8"/>
      <stop offset="100%" stop-color="#c8c8dc"/>
    </radialGradient>
    <radialGradient id="bodyGrad" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#9898b8"/>
      <stop offset="100%" stop-color="#5a5a7a"/>
    </radialGradient>
    <radialGradient id="snoutGrad" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#e8e8f4"/>
      <stop offset="100%" stop-color="#c0c0d4"/>
    </radialGradient>
    <radialGradient id="eyeGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#080810"/>
    </radialGradient>
  </defs>

  <!-- Body (peeking up behind head) -->
  <ellipse cx="100" cy="210" rx="62" ry="40" fill="url(#bodyGrad)"/>

  <!-- Neck -->
  <rect x="82" y="178" width="36" height="28" rx="14" fill="url(#faceGrad)"/>

  <!-- === EARS === -->
  <!-- Left ear (outer) -->
  <ellipse cx="54" cy="46" rx="24" ry="30" fill="#a8a8c4" transform="rotate(-12 54 46)"/>
  <!-- Left ear (inner pink) -->
  <ellipse cx="54" cy="46" rx="15" ry="21" fill="#e8a0c0" transform="rotate(-12 54 46)"/>

  <!-- Right ear (outer) -->
  <ellipse cx="146" cy="46" rx="24" ry="30" fill="#a8a8c4" transform="rotate(12 146 46)"/>
  <!-- Right ear (inner pink) -->
  <ellipse cx="146" cy="46" rx="15" ry="21" fill="#e8a0c0" transform="rotate(12 146 46)"/>

  <!-- === HEAD (wide oval, no mask) === -->
  <ellipse cx="100" cy="96" rx="58" ry="60" fill="url(#faceGrad)"/>

  <!-- === THE LONG POSSUM SNOUT (the whole point of this SVG) === -->
  <!-- Upper snout merges with face -->
  <ellipse cx="100" cy="122" rx="34" ry="24" fill="url(#snoutGrad)"/>
  <!-- Elongated lower snout — the defining possum feature -->
  <path d="M 68 115 C 62 128 64 150 72 163 C 80 175 90 182 100 183 C 110 182 120 175 128 163 C 136 150 138 128 132 115 C 120 124 110 127 100 128 C 90 127 80 124 68 115 Z" fill="url(#snoutGrad)"/>

  <!-- === EYES (large, shiny, NO MASK — possums don't have the raccoon stripe) === -->
  <!-- Left eye -->
  <circle cx="76" cy="82" r="17" fill="url(#eyeGrad)"/>
  <!-- Right eye -->
  <circle cx="124" cy="82" r="17" fill="url(#eyeGrad)"/>

  <!-- Eye shine — big and glossy -->
  <circle cx="82" cy="74" r="7" fill="white" opacity="0.95"/>
  <circle cx="130" cy="74" r="7" fill="white" opacity="0.95"/>
  <!-- Secondary small shine -->
  <circle cx="80" cy="72" r="3.5" fill="white"/>
  <circle cx="128" cy="72" r="3.5" fill="white"/>
  <!-- Tiny tertiary shine -->
  <circle cx="88" cy="80" r="2" fill="white" opacity="0.5"/>
  <circle cx="136" cy="80" r="2" fill="white" opacity="0.5"/>

  <!-- === NOSE (pink, at the pointed tip of the snout) === -->
  <ellipse cx="100" cy="172" rx="10" ry="7" fill="#dd6688"/>
  <!-- Nostrils -->
  <ellipse cx="95" cy="172" rx="3" ry="2" fill="#bb3366"/>
  <ellipse cx="105" cy="172" rx="3" ry="2" fill="#bb3366"/>

  <!-- === MOUTH (small, slightly goofy grin) === -->
  <path d="M 88 178 Q 100 187 112 178" stroke="#bb4466" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- === WHISKERS (long and dramatic — possums have great whiskers) === -->
  <!-- Left whiskers -->
  <line x1="22" y1="130" x2="70" y2="136" stroke="#d0d0e8" stroke-width="1.5" opacity="0.8"/>
  <line x1="18" y1="140" x2="70" y2="141" stroke="#d0d0e8" stroke-width="1.5" opacity="0.8"/>
  <line x1="22" y1="150" x2="70" y2="146" stroke="#d0d0e8" stroke-width="1.5" opacity="0.8"/>
  <!-- Right whiskers -->
  <line x1="130" y1="136" x2="178" y2="130" stroke="#d0d0e8" stroke-width="1.5" opacity="0.8"/>
  <line x1="130" y1="141" x2="182" y2="140" stroke="#d0d0e8" stroke-width="1.5" opacity="0.8"/>
  <line x1="130" y1="146" x2="178" y2="150" stroke="#d0d0e8" stroke-width="1.5" opacity="0.8"/>

  <!-- === FRONT PAWS (visible at sides of body) === -->
  <!-- Left paw -->
  <ellipse cx="54" cy="220" rx="20" ry="12" fill="#8888a8" transform="rotate(-25 54 220)"/>
  <!-- Left fingers (possums have 5 toes with claws) -->
  <ellipse cx="38" cy="216" rx="5" ry="3.5" fill="#7070a0" transform="rotate(-30 38 216)"/>
  <ellipse cx="44" cy="210" rx="5" ry="3.5" fill="#7070a0" transform="rotate(-15 44 210)"/>
  <ellipse cx="52" cy="208" rx="5" ry="3.5" fill="#7070a0"/>
  <ellipse cx="60" cy="210" rx="5" ry="3.5" fill="#7070a0" transform="rotate(15 60 210)"/>

  <!-- Right paw -->
  <ellipse cx="146" cy="220" rx="20" ry="12" fill="#8888a8" transform="rotate(25 146 220)"/>
  <!-- Right fingers -->
  <ellipse cx="162" cy="216" rx="5" ry="3.5" fill="#7070a0" transform="rotate(30 162 216)"/>
  <ellipse cx="156" cy="210" rx="5" ry="3.5" fill="#7070a0" transform="rotate(15 156 210)"/>
  <ellipse cx="148" cy="208" rx="5" ry="3.5" fill="#7070a0"/>
  <ellipse cx="140" cy="210" rx="5" ry="3.5" fill="#7070a0" transform="rotate(-15 140 210)"/>
</svg>
